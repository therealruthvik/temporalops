# Observability stack for the worker's Temporal SDK metrics. Prometheus scrapes
# the worker on the host; Grafana is pre-provisioned with the Prometheus data
# source and the TemporalOps dashboard.
#
#   docker compose -f deploy/observability/docker-compose.yml up -d
#   # Prometheus: http://localhost:9091   Grafana: http://localhost:3000 (admin/admin)
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: temporalops-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # Lets the container resolve host.docker.internal on Linux too.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: temporalops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
